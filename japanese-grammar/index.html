<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일본어 문법 연습</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Hiragino Kaku Gothic Pro", "Noto Sans JP", "Yu Gothic", sans-serif;
    background: #f5f0eb;
    color: #2c2c2c;
    padding: 1.5rem 2.5rem 2.5rem;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 0.5rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 1.2rem;
    flex-shrink: 0;
    border-bottom: 1px solid #c9bfb4;
  }

  .tab {
    padding: 0.5rem 3.5rem;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    border-bottom: 3px solid transparent;
    background: none;
    text-align: center;
    color: #999;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab.active { color: #2c2c2c; border-bottom-color: #2c2c2c; }
  .tab:not(.active):hover { color: #666; }

  .tab-content { display: none; flex: 1; min-height: 0; flex-direction: column; }
  .tab-content.active { display: flex; }

  /* Reference tables */
  .ref-container {
    flex: 1;
    min-height: 0;
    display: flex;
    justify-content: center;
    gap: 3rem;
    overflow: hidden;
  }

  .ref-col-left {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    min-height: 0;
    overflow-y: auto;
  }

  .ref-col-right {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    min-height: 0;
    overflow-y: auto;
  }

  .ref-section {
    flex-shrink: 0;
    margin-bottom: 1rem;
  }

  .ref-section h2 {
    font-size: 0.8rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    padding-bottom: 0.2rem;
    border-bottom: 2px solid #2c2c2c;
  }

  .ref-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.7rem;
  }

  .ref-table th {
    background: #e8ddd3;
    padding: 0.25rem 1rem;
    text-align: left;
    font-weight: 600;
    font-size: 0.6rem;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .ref-table td {
    padding: 0.25rem 1rem;
    white-space: nowrap;
    border-bottom: 1px solid #e0d8d0;
    vertical-align: middle;
    line-height: 1.3;
  }

  .ref-table tr:hover td { background: #f0ebe5; }

  .ref-table .particle-cell {
    font-size: 1rem;
    font-weight: 700;
    text-align: center;
  }

  .ref-table .korean-cell {
    font-weight: 500;
    font-size: 0.65rem;
  }

  .ref-table .example-cell {
    white-space: nowrap;
  }

  .ref-table .translation-cell {
    font-size: 0.65rem;
    color: #555;
    white-space: nowrap;
  }

  ruby { ruby-position: over; }
  rt { font-size: 0.55em; color: #888; }

  .conj-examples {
    font-size: 0.65rem;
    color: #555;
    padding: 0.3rem 0.5rem;
    line-height: 1.8;
  }

  /* Quiz */
  .quiz-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .quiz-setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.3rem;
    max-height: 100%;
    overflow-y: auto;
    padding: 0.5rem;
  }

  .quiz-setup > h2 {
    font-size: 1.2rem;
    font-weight: 600;
  }

  .setting-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .setting-group-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-align: center;
  }

  .setting-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 0.85rem;
  }

  .setting-row label {
    min-width: 140px;
    text-align: right;
    font-weight: 500;
  }

  .setting-row input[type="range"] {
    width: 140px;
    accent-color: #2c2c2c;
  }

  .setting-row .val {
    min-width: 36px;
    font-weight: 700;
    font-size: 0.95rem;
  }

  .toggle-group {
    display: flex;
    gap: 0;
  }

  .toggle-btn {
    padding: 0.3rem 0.8rem;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid #2c2c2c;
    background: #fff;
    color: #2c2c2c;
    transition: background 0.15s, color 0.15s;
  }

  .toggle-btn:first-child { border-radius: 6px 0 0 6px; }
  .toggle-btn:last-child { border-radius: 0 6px 6px 0; border-left: none; }
  .toggle-btn:not(:first-child):not(:last-child) { border-left: none; }
  .toggle-btn.active { background: #2c2c2c; color: #fff; }
  .toggle-btn:not(.active):hover { background: #e8ddd3; }

  button.start-btn {
    margin-top: 0.5rem;
    padding: 0.6rem 2.5rem;
    font-size: 1rem;
    background: #2c2c2c;
    color: #fff;
    border: 2px solid #2c2c2c;
    border-radius: 8px;
    cursor: pointer;
  }

  button.start-btn:hover { background: #444; }

  /* Active quiz */
  .quiz-active {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    width: 100%;
    max-width: 500px;
  }

  .quiz-progress {
    font-size: 0.85rem;
    color: #888;
    font-weight: 600;
  }

  .quiz-sentence {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    text-align: center;
    line-height: 2;
    min-height: 3rem;
  }

  .quiz-sentence .blank {
    display: inline-block;
    min-width: 3em;
    border-bottom: 3px solid #2c2c2c;
    margin: 0 0.2em;
  }

  .quiz-korean {
    font-size: 1.1rem;
    color: #666;
    text-align: center;
  }

  .timer-bar-track {
    width: 100%;
    height: 6px;
    background: #ddd;
    border-radius: 3px;
    overflow: hidden;
  }

  .timer-bar {
    height: 100%;
    background: #2c2c2c;
    border-radius: 3px;
    transition: width 0.1s linear;
  }

  .timer-bar.warning { background: #c44; }

  .timer-text {
    font-size: 0.8rem;
    color: #888;
    font-variant-numeric: tabular-nums;
  }

  .quiz-choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    width: 100%;
    max-width: 360px;
  }

  .choice-btn {
    padding: 0.6rem 1rem;
    font-size: 1rem;
    font-weight: 600;
    border: 2px solid #c9bfb4;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .choice-btn:hover { border-color: #2c2c2c; }
  .choice-btn.correct { background: #e8f0e8; border-color: #3a8a3a; }
  .choice-btn.wrong { background: #fdf0f0; border-color: #c44; }

  .quiz-input {
    font-size: 1.2rem;
    padding: 0.5rem 1rem;
    border: 2px solid #c9bfb4;
    border-radius: 8px;
    text-align: center;
    width: 100%;
    max-width: 360px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .quiz-input:focus { border-color: #2c2c2c; }

  .quiz-feedback {
    font-size: 0.9rem;
    font-weight: 600;
    min-height: 1.6rem;
    text-align: center;
    max-width: 400px;
    line-height: 1.5;
  }

  .quiz-feedback.correct { color: #3a8a3a; }
  .quiz-feedback.wrong { color: #c44; }

  .quiz-feedback .explanation {
    display: block;
    font-size: 0.8rem;
    font-weight: 400;
    color: #666;
    margin-top: 0.3rem;
  }

  .quiz-feedback .romaji-hint {
    display: block;
    font-size: 0.75rem;
    color: #999;
    margin-top: 0.15rem;
  }

  .next-btn {
    padding: 0.4rem 2rem;
    font-size: 0.85rem;
    font-weight: 600;
    border: 2px solid #2c2c2c;
    border-radius: 6px;
    background: #2c2c2c;
    color: #fff;
    cursor: pointer;
    display: none;
  }

  .next-btn:hover { background: #444; }

  /* Results */
  .quiz-results {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    width: 100%;
    max-width: 560px;
    max-height: 100%;
    min-height: 0;
  }

  .quiz-score {
    font-size: 1.5rem;
    font-weight: 700;
  }

  .quiz-score .pct { font-size: 1rem; color: #888; font-weight: 500; }

  .results-list {
    width: 100%;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    border: 1px solid #c9bfb4;
    border-radius: 8px;
  }

  .results-list table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }

  .results-list th {
    position: sticky;
    top: 0;
    background: #e8ddd3;
    padding: 0.35rem 0.4rem;
    text-align: center;
    font-weight: 600;
    font-size: 0.7rem;
  }

  .results-list td {
    padding: 0.3rem 0.4rem;
    text-align: center;
    border-top: 1px solid #eee;
  }

  .results-list tr.correct-row td { background: #f0f8f0; }
  .results-list tr.wrong-row td { background: #fdf0f0; }

  .results-btns {
    display: flex;
    gap: 0.5rem;
    flex-shrink: 0;
  }

  .results-btns button {
    padding: 0.4rem 1.2rem;
    font-size: 0.85rem;
    border: 2px solid #2c2c2c;
    border-radius: 6px;
    background: #fff;
    font-weight: 600;
    cursor: pointer;
  }

  .results-btns button:hover { background: #2c2c2c; color: #fff; }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    body { padding: 1rem 1rem 1.5rem; overflow: auto; height: auto; min-height: 100vh; }
    .ref-container { display: flex; flex-direction: column; overflow: visible; gap: 0.5rem; }
    .ref-col-left, .ref-col-right { overflow: visible; }
    .ref-table { font-size: 0.7rem; }
    .ref-table .particle-cell { font-size: 1rem; width: 40px; }
    .quiz-sentence { font-size: 1.1rem; }
    .tab { padding: 0.5rem 2rem; }
  }
</style>
</head>
<body>

<h1>일본어 문법 연습</h1>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('ref')">テーブル</div>
  <div class="tab" onclick="switchTab('quiz')">クイズ</div>
</div>

<div class="tab-content active" id="tab-ref">
  <div class="ref-container" id="ref-container"></div>
</div>

<div class="tab-content" id="tab-quiz">
  <div class="quiz-panel">

    <div class="quiz-setup" id="quiz-setup">
      <h2>クイズ設定 (Quiz Settings)</h2>

      <div class="setting-group">
        <div class="setting-group-title">問題タイプ (Question Type)</div>
        <div class="toggle-group" id="qtype-toggle">
          <div class="toggle-btn active" onclick="setToggle('qtype','fillin')">穴埋め (Fill-in)</div>
          <div class="toggle-btn" onclick="setToggle('qtype','translate')">翻訳 (Translation)</div>
          <div class="toggle-btn" onclick="setToggle('qtype','both')">両方 (Both)</div>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-group-title">出題範囲 (Scope)</div>
        <div class="toggle-group" id="scope-toggle">
          <div class="toggle-btn active" onclick="setToggle('scope','all')">全部 (All)</div>
          <div class="toggle-btn" onclick="setToggle('scope','particles')">조사</div>
          <div class="toggle-btn" onclick="setToggle('scope','endings')">종조사</div>
          <div class="toggle-btn" onclick="setToggle('scope','structures')">활용</div>
          <div class="toggle-btn" onclick="setToggle('scope','grammar')">문법</div>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-group-title">順番と問題数 (Order & Count)</div>
        <div class="toggle-group" id="order-toggle">
          <div class="toggle-btn active" onclick="setToggle('order','random')">ランダム (Random)</div>
          <div class="toggle-btn" onclick="setToggle('order','table')">表の順番 (Table Order)</div>
        </div>
        <div class="setting-row">
          <label>問題数 (Questions)</label>
          <input type="range" id="q-count" min="5" max="200" value="20" oninput="document.getElementById('q-count-val').textContent=this.value">
          <span class="val" id="q-count-val">20</span>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-group-title">制限時間 (Time Limit)</div>
        <div class="toggle-group" id="timer-toggle">
          <div class="toggle-btn active" onclick="setToggle('timer','on')">あり (On)</div>
          <div class="toggle-btn" onclick="setToggle('timer','off')">なし (Off)</div>
        </div>
        <div class="setting-row" id="timer-slider-row">
          <input type="range" id="q-time" min="5" max="60" value="20" oninput="document.getElementById('q-time-val').textContent=this.value+'s'">
          <span class="val" id="q-time-val">20s</span>
        </div>
      </div>

      <div class="setting-group" id="romaji-group">
        <div class="setting-group-title">ローマ字入力 (Romaji Input)</div>
        <div class="toggle-group" id="romaji-toggle">
          <div class="toggle-btn" onclick="setToggle('romaji','on')">あり (On)</div>
          <div class="toggle-btn active" onclick="setToggle('romaji','off')">なし (Off)</div>
        </div>
      </div>

      <button class="start-btn" onclick="startQuiz()">スタート</button>
    </div>

    <div class="quiz-active" id="quiz-active">
      <div class="quiz-progress" id="quiz-progress"></div>
      <div class="quiz-sentence" id="quiz-sentence"></div>
      <div class="quiz-korean" id="quiz-korean"></div>
      <div class="timer-bar-track" id="timer-track">
        <div class="timer-bar" id="timer-bar"></div>
      </div>
      <div class="timer-text" id="timer-text"></div>
      <div class="quiz-choices" id="quiz-choices"></div>
      <input type="text" class="quiz-input hidden" id="quiz-input" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="日本語で入力">
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">次へ (Next)</button>
    </div>

    <div class="quiz-results" id="quiz-results">
      <div class="quiz-score" id="quiz-score"></div>
      <div class="results-list" id="results-list"></div>
      <div class="results-btns">
        <button onclick="showSetup()">もう一回</button>
        <button onclick="switchTab('ref')">テーブルに戻る</button>
      </div>
    </div>

  </div>
</div>

<script>
// ===== DATA =====
const particlesData = [
  { particle: 'は', korean: '은/는', desc: 'topic', example: '<ruby>私<rt>わたし</rt></ruby>は<ruby>学生<rt>がくせい</rt></ruby>です', exKr: '나는 학생이다', blank: 'は', quiz: [
    { q: '<ruby>今日<rt>きょう</rt></ruby>は<ruby>天気<rt>てんき</rt></ruby>がいい', k: '오늘은 날씨가 좋다' },
    { q: '<ruby>彼女<rt>かのじょ</rt></ruby>は<ruby>医者<rt>いしゃ</rt></ruby>です', k: '그녀는 의사이다' },
    { q: 'この<ruby>映画<rt>えいが</rt></ruby>は<ruby>面白<rt>おもしろ</rt></ruby>い', k: '이 영화는 재미있다' },
  ]},
  { particle: 'が', korean: '이/가', desc: 'subject', example: '<ruby>私<rt>わたし</rt></ruby>がやります', exKr: '내가 한다', blank: 'が', quiz: [
    { q: '<ruby>雨<rt>あめ</rt></ruby>が<ruby>降<rt>ふ</rt></ruby>っている', k: '비가 오고 있다' },
    { q: '<ruby>電話<rt>でんわ</rt></ruby>が<ruby>鳴<rt>な</rt></ruby>った', k: '전화가 울렸다' },
    { q: '<ruby>頭<rt>あたま</rt></ruby>が<ruby>痛<rt>いた</rt></ruby>い', k: '머리가 아프다' },
  ]},
  { particle: 'を', korean: '을/를', desc: 'object', example: 'ご<ruby>飯<rt>はん</rt></ruby>を<ruby>食<rt>た</rt></ruby>べる', exKr: '밥을 먹는다', blank: 'を', quiz: [
    { q: '<ruby>水<rt>みず</rt></ruby>を<ruby>飲<rt>の</rt></ruby>む', k: '물을 마신다' },
    { q: '<ruby>音楽<rt>おんがく</rt></ruby>を<ruby>聴<rt>き</rt></ruby>く', k: '음악을 듣는다' },
    { q: '<ruby>手<rt>て</rt></ruby>を<ruby>洗<rt>あら</rt></ruby>う', k: '손을 씻는다' },
  ]},
  { particle: 'の', korean: '의', desc: 'possession', example: '<ruby>私<rt>わたし</rt></ruby>の<ruby>家<rt>いえ</rt></ruby>', exKr: '나의 집', blank: 'の', quiz: [
    { q: '<ruby>友達<rt>ともだち</rt></ruby>の<ruby>車<rt>くるま</rt></ruby>', k: '친구의 차' },
    { q: '<ruby>日本<rt>にほん</rt></ruby>の<ruby>食<rt>た</rt></ruby>べ<ruby>物<rt>もの</rt></ruby>', k: '일본의 음식' },
    { q: '<ruby>会社<rt>かいしゃ</rt></ruby>の<ruby>近<rt>ちか</rt></ruby>く', k: '회사의 근처' },
  ]},
  { particle: 'も', korean: '~도', desc: 'also', example: '<ruby>私<rt>わたし</rt></ruby>も<ruby>行<rt>い</rt></ruby>く', exKr: '나도 간다', blank: 'も', quiz: [
    { q: '<ruby>彼<rt>かれ</rt></ruby>も<ruby>来<rt>く</rt></ruby>る', k: '그도 온다' },
    { q: 'ここも<ruby>静<rt>しず</rt></ruby>かだ', k: '여기도 조용하다' },
    { q: '<ruby>妹<rt>いもうと</rt></ruby>も<ruby>歌<rt>うた</rt></ruby>が<ruby>上手<rt>じょうず</rt></ruby>だ', k: '여동생도 노래를 잘한다' },
  ]},
  { particle: 'と', korean: '와/과', desc: 'and/with', example: '<ruby>犬<rt>いぬ</rt></ruby>と<ruby>猫<rt>ねこ</rt></ruby>', exKr: '개와 고양이', blank: 'と', quiz: [
    { q: '<ruby>父<rt>ちち</rt></ruby>と<ruby>母<rt>はは</rt></ruby>', k: '아버지와 어머니' },
    { q: '<ruby>友達<rt>ともだち</rt></ruby>と<ruby>映画<rt>えいが</rt></ruby>を<ruby>見<rt>み</rt></ruby>た', k: '친구와 영화를 봤다' },
    { q: 'コーヒーとケーキ', k: '커피와 케이크' },
  ]},
  { particle: 'へ', korean: '~로/으로', desc: 'direction', example: '<ruby>日本<rt>にほん</rt></ruby>へ<ruby>行<rt>い</rt></ruby>く', exKr: '일본으로 간다', blank: 'へ', quiz: [
    { q: '<ruby>駅<rt>えき</rt></ruby>へ<ruby>走<rt>はし</rt></ruby>る', k: '역으로 달린다' },
    { q: '<ruby>南<rt>みなみ</rt></ruby>へ<ruby>向<rt>む</rt></ruby>かう', k: '남쪽으로 향하다' },
    { q: '<ruby>海<rt>うみ</rt></ruby>へ<ruby>行<rt>い</rt></ruby>きたい', k: '바다로 가고 싶다' },
  ]},
  { particle: 'に', korean: '에/에게', desc: 'target/time', example: '<ruby>学校<rt>がっこう</rt></ruby>に<ruby>行<rt>い</rt></ruby>く', exKr: '학교에 간다', blank: 'に', quiz: [
    { q: '<ruby>七時<rt>しちじ</rt></ruby>に<ruby>起<rt>お</rt></ruby>きる', k: '7시에 일어난다' },
    { q: '<ruby>友達<rt>ともだち</rt></ruby>にプレゼントをあげる', k: '친구에게 선물을 준다' },
    { q: '<ruby>椅子<rt>いす</rt></ruby>に<ruby>座<rt>すわ</rt></ruby>る', k: '의자에 앉는다' },
  ]},
  { particle: 'で', korean: '에서/로', desc: 'place/means', example: '<ruby>学校<rt>がっこう</rt></ruby>で<ruby>勉強<rt>べんきょう</rt></ruby>する', exKr: '학교에서 공부한다', blank: 'で', quiz: [

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (tab === 'ref' ? i === 0 : i === 1));
  });
  document.getElementById('tab-ref').classList.toggle('active', tab === 'ref');
  document.getElementById('tab-quiz').classList.toggle('active', tab === 'quiz');
  if (tab === 'ref') clearQuizTimer();
}

// ===== RENDER REFERENCE TABLES =====
function renderRefTables() {
  const container = document.getElementById('ref-container');

  function makeParticleTable(data, title) {
    let html = '<div class="ref-section"><h2>' + title + '</h2>';
    html += '<table class="ref-table"><thead><tr><th>조사</th><th>한국어</th><th>예문</th><th>직역</th></tr></thead><tbody>';
    for (const d of data) {
      html += '<tr><td class="particle-cell">' + d.particle + '</td><td class="korean-cell">' + d.korean + '</td><td class="example-cell">' + d.example + '</td><td class="translation-cell">' + d.exKr + '</td></tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  function makeConjugationTable(data, title) {
    const tenses = ['현재', '과거'];
    let html = '<div class="ref-section"><h2>' + title + '</h2>';
    html += '<table class="ref-table"><thead><tr><th>시제</th><th>긍정 (+)</th><th>부정 (−)</th></tr></thead><tbody>';
    for (const t of tenses) {
      const pos = data.find(d => d.form === t + ' 긍정');
      const neg = data.find(d => d.form === t + ' 부정');
      if (pos && neg) {
        html += '<tr><td>' + t + '</td><td class="particle-cell">' + pos.pattern + '</td><td class="particle-cell">' + neg.pattern + '</td></tr>';
      }
    }
    html += '</tbody></table>';
    const pos0 = data.find(d => d.form === '현재 긍정');
    const neg0 = data.find(d => d.form === '현재 부정');
    if (pos0) {
      html += '<div class="conj-examples">' + pos0.example + ' → ' + pos0.exKr;
      if (neg0) html += '<br>' + neg0.example + ' → ' + neg0.exKr;
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function makeGrammarTable(data, title) {
    let html = '<div class="ref-section"><h2>' + title + '</h2>';
    html += '<table class="ref-table"><thead><tr><th>형태</th><th>핵심 패턴</th><th>예문</th><th>직역</th></tr></thead><tbody>';
    for (const d of data) {
      html += '<tr><td>' + d.form + '</td><td class="particle-cell" style="font-size:0.75rem">' + d.pattern + '</td><td class="example-cell">' + d.example + '</td><td class="translation-cell">' + d.exKr + '</td></tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  let left = '';
  left += makeParticleTable(particlesData, '기본 조사 (Basic Particles)');
  left += makeConjugationTable(structuresData.filter(s => s.category === 'noun'), '1. 명사 & な형용사 (Desu グループ / です形)');
  left += makeConjugationTable(structuresData.filter(s => s.category === 'i-adj'), '2. い형용사 (い-adj 변화)');
  left += makeConjugationTable(structuresData.filter(s => s.category === 'verb'), '3. 동사 (ます グループ / ます形)');

  let right = '';
  right += makeParticleTable(endingsData, '종조사 (Sentence-ending Particles)');

  // Grammar patterns grouped by section
  const sections = [];
  const sectionMap = {};
  for (const g of grammarData) {
    if (!sectionMap[g.section]) {
      sectionMap[g.section] = [];
      sections.push(g.section);
    }
    sectionMap[g.section].push(g);
  }
  const sectionTitles = {
    '비교': '~より / ~のほうが (비교)',
    '~の': '~の (것/소유)',
    '계획': '~つもり (계획)',
    '변화': '~くなる / ~になる (변화)',
    '희망': '~たい / ~たがる (희망)',
    '나열': '~たり~たり (이것저것)',
    '경험': '~ことがある (경험)',
    '과도': '~すぎる (너무)',
    '추천': '~ほうがいい (추천)',
    '설명': '~んです (설명톤)',
    '추측': '~でしょう (추측)',
    '의무': '~なければいけません (해야 함)',
    'て형': '~て / ~てから / ~ている (て형)',
    '요청/허가': '~てください / ~てもいい / ~てはいけません',
    '권유/제안': '~ましょう / ~ませんか (권유)',
    '목적/선호': '~に行く / ~のが好き (목적/선호)',
    '보통형': '辞書形 / ~ない (보통형)',
    '인용': '~と思います / ~と言っていました (인용)',
    '불특정': '何か / だれか / どこか (불특정 표현)',
    '빈도': 'よく / ときどき / あまり~ない (빈도)',
    '시간': '~時間 (기간)',
    '완곡': '~が / ~けど (완곡 표현)',
  };
  for (const sec of sections) {
    right += makeGrammarTable(sectionMap[sec], sectionTitles[sec] || sec);
  }

  container.innerHTML = '<div class="ref-col-left">' + left + '</div><div class="ref-col-right">' + right + '</div>';
}

// ===== QUIZ SETTINGS =====
const settings = { qtype: 'fillin', scope: 'all', order: 'random', timer: 'on', romaji: 'off' };

function setToggle(group, value) {
  settings[group] = value;
  const container = document.getElementById(group + '-toggle');
  const btns = container.querySelectorAll('.toggle-btn');
  btns.forEach(b => {
    const btnVal = b.getAttribute('onclick').match(/'([^']+)'\)/)[1];
    b.classList.toggle('active', btnVal === value);
  });

  if (group === 'timer') {
    document.getElementById('timer-slider-row').classList.toggle('hidden', value === 'off');
  }
  if (group === 'scope' || group === 'qtype') updateMaxCount();
  if (group === 'qtype') {
    document.getElementById('romaji-group').classList.toggle('hidden', value === 'fillin');
  }
}

function updateMaxCount() {
  const pool = getQuizPool();
  const slider = document.getElementById('q-count');
  slider.max = pool.length;
  if (parseInt(slider.value) > pool.length) {
    slider.value = pool.length;
    document.getElementById('q-count-val').textContent = pool.length;
  }
}

// ===== QUIZ LOGIC =====
let quizQuestions = [];
let quizResults = [];
let quizIndex = 0;
let quizTimeLimit = 20;
let quizTimer = null;
let quizTimeLeft = 0;
let quizLocked = false;

function fisherYates(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function expandQuiz(data, type, source) {
  const items = [];
  data.forEach(d => {
    if (d.quiz && d.quiz.length) {
      d.quiz.forEach(qe => {
        const expanded = Object.assign({}, d, { qEx: qe.q, qKr: qe.k });
        if (qe.a) expanded.answer = qe.a;
        if (qe.r) expanded.romaji = qe.r;
        items.push({ type, source, data: expanded });
      });
    } else {
      items.push({ type, source, data });
    }
  });
  return items;
}

function getQuizPool() {
  const pool = [];
  const qtype = settings.qtype;
  const scope = settings.scope;

  if (qtype === 'fillin' || qtype === 'both') {
    if (scope === 'all' || scope === 'particles') {
      pool.push(...expandQuiz(particlesData, 'fillin', 'particles'));
    }
    if (scope === 'all' || scope === 'endings') {
      pool.push(...expandQuiz(endingsData, 'fillin', 'endings'));
    }
  }
  if (qtype === 'translate' || qtype === 'both') {
    if (scope === 'all' || scope === 'particles') {
      pool.push(...expandQuiz(particlesData, 'translate', 'particles'));
    }
    if (scope === 'all' || scope === 'endings') {
      pool.push(...expandQuiz(endingsData, 'translate', 'endings'));
    }
    if (scope === 'all' || scope === 'structures') {
      pool.push(...expandQuiz(structuresData, 'translate', 'structures'));
    }
    if (scope === 'all' || scope === 'grammar') {
      pool.push(...expandQuiz(grammarData, 'translate', 'grammar'));
    }
  }
  if (qtype === 'fillin' && (scope === 'all' || scope === 'structures')) {
    pool.push(...expandQuiz(structuresData, 'translate', 'structures'));
  }
  if (qtype === 'fillin' && (scope === 'all' || scope === 'grammar')) {
    pool.push(...expandQuiz(grammarData, 'translate', 'grammar'));
  }
  return pool;
}

function getAllParticles(source) {
  if (source === 'particles') return particlesData.map(d => d.particle);
  if (source === 'endings') return endingsData.map(d => d.particle);
  return [...particlesData.map(d => d.particle), ...endingsData.map(d => d.particle)];
}

function clearQuizTimer() {
  if (quizTimer) { clearInterval(quizTimer); quizTimer = null; }
}

function showSetup() {
  clearQuizTimer();
  document.getElementById('quiz-setup').style.display = 'flex';
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'none';
}

function startQuiz() {
  const count = parseInt(document.getElementById('q-count').value);
  quizTimeLimit = parseInt(document.getElementById('q-time').value);
  const pool = getQuizPool();
  quizQuestions = settings.order === 'random' ? fisherYates(pool).slice(0, count) : pool.slice(0, count);
  quizResults = [];
  quizIndex = 0;

  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'flex';
  document.getElementById('quiz-results').style.display = 'none';

  showQuestion();
}

function showQuestion() {
  if (quizIndex >= quizQuestions.length) { endQuiz(); return; }

  quizLocked = false;
  const q = quizQuestions[quizIndex];
  document.getElementById('quiz-progress').textContent = (quizIndex + 1) + ' / ' + quizQuestions.length;
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-feedback').className = 'quiz-feedback';
  document.getElementById('next-btn').style.display = 'none';

  const choicesEl = document.getElementById('quiz-choices');
  const inputEl = document.getElementById('quiz-input');
  const koreanEl = document.getElementById('quiz-korean');
  const sentenceEl = document.getElementById('quiz-sentence');

  choicesEl.innerHTML = '';
  choicesEl.classList.remove('hidden');
  inputEl.classList.add('hidden');
  inputEl.value = '';
  koreanEl.textContent = '';

  if (q.type === 'fillin') {
    // Show sentence with blank
    const d = q.data;
    const qSrc = d.qEx || d.example;
    let sentenceHtml = qSrc.replace(new RegExp('(?<![a-z])' + escapeRegex(d.blank) + '(?![a-z])', ''), '<span class="blank">&nbsp;</span>');
    if (!sentenceHtml.includes('blank')) {
      sentenceHtml = qSrc.replace(d.blank, '<span class="blank">&nbsp;</span>');
    }
    sentenceEl.innerHTML = sentenceHtml;
    koreanEl.textContent = d.qKr || d.exKr;

    // Generate 4 choices
    const allP = [...new Set(getAllParticles(q.source))];
    const correct = d.particle;
    let choices = [correct];
    const others = fisherYates(allP.filter(p => p !== correct));
    choices = choices.concat(others.slice(0, 3));
    choices = fisherYates(choices);

    choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = c;
      btn.addEventListener('click', () => checkFillin(btn, c, correct));
      choicesEl.appendChild(btn);
    });
  } else {
    // Translation mode
    choicesEl.classList.add('hidden');
    inputEl.classList.remove('hidden');
    inputEl.disabled = false;
    inputEl.placeholder = settings.romaji === 'on' ? 'ローマ字 or 日本語' : '日本語で入力';

    koreanEl.textContent = q.data.qKr || q.data.exKr;
    sentenceEl.innerHTML = '韓国語を日本語に:';
    inputEl.focus();
  }

  // Timer
  if (settings.timer === 'on') {
    document.getElementById('timer-track').classList.remove('hidden');
    document.getElementById('timer-text').classList.remove('hidden');
    quizTimeLeft = quizTimeLimit;
    updateTimerDisplay();
    const bar = document.getElementById('timer-bar');
    bar.style.width = '100%';
    bar.classList.remove('warning');
    clearQuizTimer();
    const startTime = Date.now();
    quizTimer = setInterval(() => {
      const elapsed = (Date.now() - startTime) / 1000;
      quizTimeLeft = Math.max(0, quizTimeLimit - elapsed);
      bar.style.width = (quizTimeLeft / quizTimeLimit * 100) + '%';
      if (quizTimeLeft / quizTimeLimit < 0.25) bar.classList.add('warning');
      updateTimerDisplay();
      if (quizTimeLeft <= 0) { clearQuizTimer(); handleTimeout(); }
    }, 100);
  } else {
    document.getElementById('timer-track').classList.add('hidden');
    document.getElementById('timer-text').classList.add('hidden');
  }
}

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function updateTimerDisplay() {
  document.getElementById('timer-text').textContent = Math.ceil(quizTimeLeft) + 's';
}

function getExplanation(q, chosen) {
  const d = q.data;
  const kr = d.qKr || d.exKr;
  if (q.type === 'fillin') {
    return d.particle + ' (' + d.korean + ') = ' + d.desc + '. ' + kr;
  }
  if (q.source === 'structures' || q.source === 'grammar') {
    return d.pattern + ' = ' + d.form + '. ' + kr;
  }
  return d.particle + ' (' + d.korean + ') = ' + d.desc + '. ' + kr;
}

function getRomaji(q) {
  if ((q.source === 'structures' || q.source === 'grammar') && q.data.romaji) return q.data.romaji;
  // Build romaji from example by stripping to plain text
  const plain = q.data.example.replace(/<ruby>([^<]*)<rt>[^<]*<\/rt><\/ruby>/g, '$1').replace(/<[^>]+>/g, '');
  return plain;
}

function showFeedback(passed, q, chosen) {
  const fb = document.getElementById('quiz-feedback');
  const nextBtn = document.getElementById('next-btn');

  if (passed) {
    fb.textContent = '\u2713';
    fb.className = 'quiz-feedback correct';
    nextBtn.style.display = 'inline-block';
  } else {
    let html = q.data.qEx || q.data.example;
    if ((q.source === 'structures' || q.source === 'grammar') && q.data.romaji) {
      html += '<span class="romaji-hint">' + q.data.romaji + '</span>';
    }
    html += '<span class="explanation">' + getExplanation(q, chosen) + '</span>';
    fb.innerHTML = html;
    fb.className = 'quiz-feedback wrong';
    nextBtn.style.display = 'inline-block';
  }
}

function nextQuestion() {
  document.getElementById('next-btn').style.display = 'none';
  quizIndex++;
  showQuestion();
}

function handleTimeout() {
  quizLocked = true;
  const q = quizQuestions[quizIndex];
  const correctDisplay = q.type === 'fillin' ? q.data.particle : (q.data.qEx || q.data.example);

  quizResults.push({ q, answer: '\u2014', correct: correctDisplay, passed: false });

  if (q.type === 'fillin') {
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === q.data.particle) b.classList.add('correct');
    });
  }

  showFeedback(false, q, null);
}

function checkFillin(btn, chosen, correct) {
  if (quizLocked) return;
  quizLocked = true;
  clearQuizTimer();

  const passed = chosen === correct;
  quizResults.push({ q: quizQuestions[quizIndex], answer: chosen, correct: correct, passed });

  if (passed) {
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
    });
  }

  showFeedback(passed, quizQuestions[quizIndex], chosen);
}

function checkTranslation() {
  if (quizLocked) return;
  const input = document.getElementById('quiz-input');
  const answer = input.value.trim();
  if (!answer) return;

  quizLocked = true;
  clearQuizTimer();
  input.disabled = true;

  const q = quizQuestions[quizIndex];
  let correctText, correctDisplay;

  if (q.source === 'structures' || q.source === 'grammar') {
    correctText = q.data.answer;
    correctDisplay = q.data.qEx || q.data.example;
  } else {
    const qSrc = q.data.qEx || q.data.example;
    correctText = qSrc.replace(/<ruby>([^<]*)<rt>[^<]*<\/rt><\/ruby>/g, '$1').replace(/<[^>]+>/g, '');
    correctDisplay = qSrc;
  }

  const normalize = s => s.replace(/\s+/g, '').replace(/[。、！？]/g, '');
  let passed = normalize(answer) === normalize(correctText);

  if (!passed && settings.romaji === 'on' && (q.source === 'structures' || q.source === 'grammar')) {
    const romajiNorm = normalize(q.data.romaji.toLowerCase());
    passed = normalize(answer.toLowerCase()) === romajiNorm;
  }

  quizResults.push({ q, answer, correct: correctDisplay, passed });

  showFeedback(passed, q, answer);
}

function endQuiz() {
  clearQuizTimer();
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'flex';

  const total = quizResults.length;
  const right = quizResults.filter(r => r.passed).length;
  const pct = Math.round((right / total) * 100);
  document.getElementById('quiz-score').innerHTML = right + ' / ' + total + ' <span class="pct">(' + pct + '%)</span>';

  let html = '<table><thead><tr><th>#</th><th>문제</th><th>입력</th><th>정답</th><th></th></tr></thead><tbody>';
  quizResults.forEach((r, i) => {
    const cls = r.passed ? 'correct-row' : 'wrong-row';
    const icon = r.passed ? '<span style="color:#3a8a3a">\u2713</span>' : '<span style="color:#c44">\u2717</span>';
    const qLabel = r.q.type === 'fillin' ? r.q.data.particle : r.q.data.exKr;
    html += '<tr class="' + cls + '"><td>' + (i+1) + '</td><td>' + qLabel + '</td><td>' + r.answer + '</td><td>' + r.correct + '</td><td>' + icon + '</td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('results-list').innerHTML = html;
}

// Enter key for translation
document.getElementById('quiz-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') checkTranslation();
});

// Init
renderRefTables();
updateMaxCount();
</script>
